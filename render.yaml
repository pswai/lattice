databases:
  - name: lattice-db
    plan: basic-256mb
    databaseName: lattice
    postgresMajorVersion: "16"

services:
  - type: web
    name: lattice
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lattice-db
          property: connectionString
      - key: ADMIN_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: LOG_FORMAT
        value: json
      - key: HSTS_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: https://agent-lattice.com
