services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lattice_test
      POSTGRES_USER: lattice
      POSTGRES_PASSWORD: lattice
    ports:
      - "5433:5432"
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lattice -d lattice_test"]
      interval: 3s
      timeout: 3s
      retries: 10
