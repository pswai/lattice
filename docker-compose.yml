services:
  lattice:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/lattice.db
      - ADMIN_KEY=${ADMIN_KEY:-change-me-in-production}
      - EVENT_RETENTION_DAYS=30
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
